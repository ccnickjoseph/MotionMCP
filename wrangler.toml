name = "motion-mcp-server"
main = "src/worker.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[durable_objects]
bindings = [
  { name = "MCP_OBJECT", class_name = "MotionMCPAgent" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MotionMCPAgent"]

[vars]
MOTION_MCP_TOOLS = "essential"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1


# Secrets set via wrangler:
#   npx wrangler secret put MOTION_API_KEY
#   npx wrangler secret put MOTION_MCP_SECRET
